<!DOCTYPE html><html><head><meta charset="utf-8"><script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script></head><body>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
    .ev-setup { background:linear-gradient(145deg,#020617 0%,#0f172a 100%); padding:40px; border-radius:20px;
        color:#f8fafc; font-family:'Inter',sans-serif; border:1px solid rgba(34,211,238,0.3); }
    .ev-stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:20px; }
    .ev-stat { background:rgba(15,23,42,0.7); border:1px solid rgba(255,255,255,0.08); border-radius:12px;
        padding:16px; text-align:center; }
    .ev-stat-val { font-family:'JetBrains Mono',monospace; font-size:1.6rem; font-weight:900; color:#22d3ee; }
    .ev-stat-lbl { color:#94a3b8; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; margin-top:4px; }
    .ev-badge { display:inline-block; padding:4px 12px; border-radius:6px; font-size:0.8rem; font-weight:700; }
</style>
<div class="ev-setup">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
        <span style="font-size:1.5rem; background:rgba(34,211,238,0.15); padding:8px; border-radius:10px; border:1px solid rgba(34,211,238,0.3);">01</span>
        <div>
            <div style="color:#22d3ee; font-family:'JetBrains Mono',monospace; font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:0.1em;">Model Yükleme & Setup</div>
            <h3 style="margin:4px 0 0 0; font-size:1.5rem; font-weight:800; color:#f8fafc;">Şampiyon Model Hazır — Extra Trees</h3>
        </div>
    </div>
    <div style="background:rgba(34,211,238,0.08); border-left:4px solid #22d3ee; padding:14px 20px; border-radius:0 8px 8px 0; margin-bottom:20px; font-family:'JetBrains Mono',monospace; font-size:0.9rem; color:#67e8f9;">
        ✅ MODEL BAŞARIYLA YÜKLENDİ & TAHMİN YAPILDI
    </div>
    <div class="ev-stat-grid">
        <div class="ev-stat"><div class="ev-stat-val">0.8117</div><div class="ev-stat-lbl">Accuracy</div></div>
        <div class="ev-stat"><div class="ev-stat-val">0.8084</div><div class="ev-stat-lbl">F1-Score</div></div>
        <div class="ev-stat"><div class="ev-stat-val">0.8101</div><div class="ev-stat-lbl">Precision</div></div>
        <div class="ev-stat"><div class="ev-stat-val">0.8068</div><div class="ev-stat-lbl">Recall</div></div>
        <div class="ev-stat"><div class="ev-stat-val" style="color:#a855f7;">0.9034</div><div class="ev-stat-lbl">ROC-AUC</div></div>
    </div>
    <div style="margin-top:20px; color:#64748b; font-size:0.85rem; font-family:'JetBrains Mono',monospace;">
        Eğitim Seti: <span style="color:#38bdf8;">24,000 örnek</span> &nbsp;|&nbsp;
        Test Seti: <span style="color:#38bdf8;">6,000 örnek</span> &nbsp;|&nbsp;
        Özellik Sayısı: <span style="color:#38bdf8;">94</span> &nbsp;|&nbsp;
        CT Dengesi: <span style="color:#38bdf8;">49.2%</span>
    </div>
</div>
</body></html>
