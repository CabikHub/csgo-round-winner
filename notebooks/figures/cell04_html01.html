<!DOCTYPE html><html><head><meta charset="utf-8"><script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script></head><body>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap');
    
    .data-panel {
        background: linear-gradient(145deg, #020617 0%, #0f172a 100%);
        padding: 30px;
        border-radius: 16px;
        color: #f8fafc;
        font-family: 'Inter', sans-serif;
        border: 1px solid rgba(51, 65, 85, 0.6);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .panel-header {
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 15px;
        margin-bottom: 20px;
    }

    .icon-box {
        background: rgba(56, 189, 248, 0.1);
        color: #38bdf8;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 1.2rem;
        border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 25px;
    }

    .stat-card {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 15px;
        text-align: center;
    }

    .stat-title { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 8px; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 800; color: #f8fafc; }
    .stat-value.blue { color: #38bdf8; }
    .stat-value.purple { color: #a78bfa; }
    .stat-value.green { color: #10b981; }

    .dist-container {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 20px;
    }

    .dist-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
    }

    .bar-wrapper {
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        overflow: hidden;
        display: flex;
    }

    .bar-ct { width: 49.25%; background: linear-gradient(90deg, #1d4ed8, #3b82f6); }
    .bar-t { width: 50.74999999999999%; background: linear-gradient(90deg, #b45309, #f59e0b); }
</style>

<div class="data-panel">
    <div class="panel-header">
        <div class="icon-box">📊</div>
        <h3 style="margin: 0; font-size: 1.3rem; font-weight: 700;">Veri Seti Genel Bilgisi</h3>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">Gözlem Sayısı</div>
            <div class="stat-value blue">30,000</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Değişken Sayısı</div>
            <div class="stat-value purple">97</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Hedef Sütun</div>
            <div class="stat-value green" style="font-size: 1.1rem; padding-top: 5px;">round_winner</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Sınıflar</div>
            <div class="stat-value" style="font-size: 1.1rem; padding-top: 5px; color: #cbd5e1;">CT, T</div>
        </div>
    </div>

    <div class="dist-container">
        <div style="color: #e2e8f0; font-size: 0.95rem; font-weight: 600; margin-bottom: 15px;">Hedef Değişken Dağılımı (CT vs T)</div>
        
        <div class="dist-header">
            <div style="color: #60a5fa;">CT: 14,775 (49.2%)</div>
            <div style="color: #fbbf24;">T: 15,225 (50.7%)</div>
        </div>
        
        <div class="bar-wrapper">
            <div class="bar-ct"></div>
            <div class="bar-t"></div>
        </div>
    </div>
</div>
</body></html>
