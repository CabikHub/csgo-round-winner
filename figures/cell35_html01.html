<!DOCTYPE html><html><head><meta charset="utf-8"><script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script></head><body>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap');
    
    .sim-header {
        background: linear-gradient(145deg, #020617 0%, #0f172a 100%);
        padding: 25px 35px;
        border-radius: 16px;
        border: 1px solid rgba(16, 185, 129, 0.3);
        font-family: 'Inter', sans-serif;
        color: #f8fafc;
        margin-bottom: 20px;
    }
    .widget-container {
        background: #0f172a;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid rgba(16, 185, 129, 0.2);
        margin-bottom: 15px;
    }

    /* VS Code Widget Metin Renklerini Zorla Düzeltme (!important) */
    .widget-label { 
        color: #cbd5e1 !important; 
        font-family: 'Inter', sans-serif !important; 
        font-weight: 600 !important;
    }
    .widget-readout { 
        color: #34d399 !important; 
        font-family: 'JetBrains Mono', monospace !important; 
        font-weight: 700 !important;
        background: transparent !important;
        box-shadow: none !important;
    }
    .widget-dropdown > select { 
        background-color: #1e293b !important; 
        color: #f8fafc !important; 
        border: 1px solid rgba(52, 211, 153, 0.5) !important; 
        border-radius: 6px !important;
        font-family: 'Inter', sans-serif !important;
        padding: 4px 8px !important;
    }
    .widget-dropdown > select:focus {
        outline: none !important;
        border-color: #34d399 !important;
    }
</style>
<div class="sim-header">
    <div style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 1.8rem;">⚙️</span>
        <div>
            <h3 style="margin: 0; font-size: 1.3rem; font-weight: 800; color: #34d399;">Canlı Sınıf Kayması (Class Shift) Simülatörü</h3>
            <p style="margin: 4px 0 0 0; color: #94a3b8; font-size: 0.9rem;">Bölme metodunun, veri sızıntısı ve sınıf dengesi üzerindeki anlık etkisini test et.</p>
        </div>
    </div>
</div>
</body></html>
